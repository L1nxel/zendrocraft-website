<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password • ZendroCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-x-3">
                <img src="logo.png" alt="ZendroCraft" class="w-12 h-12 rounded-2xl">
                <span class="font-display text-3xl font-semibold tracking-tighter">ZendroCraft</span>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8">
            <h1 class="text-3xl font-semibold mb-2 text-center">Set New Password</h1>
            <p class="text-slate-400 text-center mb-8">Enter your new password below.</p>

            <div id="reset-form">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">New Password</label>
                        <input type="password" id="new-password" 
                               class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-amber-500"
                               placeholder="Enter new password">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Confirm New Password</label>
                        <input type="password" id="confirm-password" 
                               class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-amber-500"
                               placeholder="Confirm new password">
                    </div>
                </div>

                <button onclick="resetPassword()"
                        class="mt-6 w-full py-3.5 bg-amber-600 hover:bg-amber-500 rounded-3xl font-semibold transition-colors">
                    Update Password
                </button>
            </div>

            <div id="success-message" class="hidden text-center py-8">
                <i class="fa-solid fa-check-circle text-emerald-400 text-5xl mb-4"></i>
                <h3 class="text-2xl font-semibold mb-2">Password Updated!</h3>
                <p class="text-slate-400 mb-6">You can now log in with your new password.</p>
                <a href="index.html" 
                   class="inline-block px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-3xl font-medium transition-colors">
                    Go to Homepage
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://syixpmhmpyqbxwyjhynj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5aXB4bWhtcHlxYnh3amh5amhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTg0OTAsImV4cCI6MjA5ODc3NDQ5MH0.38rPtmkqSSSozJeRqP4eF8MK3vKitzcPULzFyeBlbms'; // ← Replace with your real anon key

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function resetPassword() {
            const newPassword = document.getElementById('new-password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();

            if (!newPassword || !confirmPassword) {
                alert("Please fill in both fields.");
                return;
            }

            if (newPassword.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            if (newPassword !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            try {
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    alert("Error: " + error.message);
                    return;
                }

                // Show success
                document.getElementById('reset-form').classList.add('hidden');
                document.getElementById('success-message').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                alert("Something went wrong. Please try again.");
            }
        }

        // Optional: Auto-focus first field
        window.onload = () => {
            document.getElementById('new-password').focus();
        };
    </script>
</body>
</html>
