<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community • ZendroCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- Navbar (you can keep your existing one or use this) -->
    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-lg sticky top-0 z-50">
        <div class="max-w-screen-xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-9 h-9 bg-indigo-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-cube text-white text-2xl"></i>
                </div>
                <span class="font-display text-2xl font-semibold tracking-tighter">ZendroCraft</span>
            </div>
            
            <div class="flex items-center gap-x-4">
                <!-- Login / Account Button -->
                <button id="auth-button"
                        class="px-5 py-2 text-sm font-medium bg-slate-900 hover:bg-slate-800 border border-slate-700 rounded-3xl transition-colors">
                    Login / Register
                </button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="max-w-screen-xl mx-auto px-8 pt-12 pb-8">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="font-display text-5xl font-semibold tracking-tighter">Community</h1>
                <p class="text-slate-400 mt-2">Share your builds, moments, and adventures with the community.</p>
            </div>
            
            <!-- Upload Button -->
            <button id="upload-btn"
                    class="hidden items-center gap-x-2 px-6 py-3 bg-indigo-600 hover:bg-indigo-500 rounded-3xl font-semibold transition-colors">
                <i class="fa-solid fa-upload"></i>
                <span>Upload Screenshot</span>
            </button>
        </div>
    </div>

    <!-- Image Grid -->
    <div class="max-w-screen-xl mx-auto px-8 pb-20">
        <div id="posts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Posts will be loaded here by JavaScript -->
            <div class="col-span-full text-center py-12 text-slate-500">
                Loading community posts...
            </div>
        </div>
    </div>

    <!-- Login / Register Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-md p-8">
            <!-- Modal content will go here -->
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold" id="modal-title">Login</h2>
                <button onclick="closeAuthModal()" class="text-slate-400 hover:text-white">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
            
            <!-- Login Form -->
            <div id="login-form">
                <!-- We'll add the actual form fields next -->
            </div>
            
            <!-- Register Form (hidden by default) -->
            <div id="register-form" class="hidden">
                <!-- We'll add this next -->
            </div>
        </div>
    </div>

    <script>
        // We'll add all the JavaScript here in the next steps
    </script>

</body>
</html>
