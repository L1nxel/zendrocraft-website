<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community • ZendroCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
#post-btn {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

#post-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
}
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

<!-- Navbar -->
<nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-lg sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto">
        <div class="px-8 py-5 flex items-center justify-between">
<!-- Logo -->
<div class="flex items-center gap-x-3 cursor-pointer" onclick="window.location.href='index.html'">
    <img src="logo.png" alt="ZendroCraft" class="w-11 h-11 rounded-2xl">
    <span class="font-display text-3xl font-semibold tracking-tighter">ZendroCraft</span>
</div>

            <!-- Right Side -->
            <div class="flex items-center gap-x-4">

                <!-- Server IP (Copy Play.ZendroCraft.Com) -->
                <div onclick="copyServerIP()" 
                     class="hidden md:flex items-center gap-x-2 px-4 py-2 bg-slate-900 border border-slate-700 hover:border-emerald-500/50 transition-colors rounded-3xl cursor-pointer group">
                    <div class="flex items-center gap-x-2">
                        <i class="fa-solid fa-globe text-emerald-400"></i>
                        <div>
                            <span class="text-sm text-slate-400">Server IP</span>
                            <span class="font-mono font-semibold ml-1.5 group-hover:text-emerald-400 transition-colors">Play.ZendroCraft.Com</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-copy text-emerald-400 opacity-60 group-hover:opacity-100 transition-all ml-1"></i>
                </div>

                <!-- Dynamic Auth Section -->
                <div class="relative" id="nav-auth-section">
                    <!-- Content controlled by JavaScript -->
                </div>

            </div>
        </div>
    </div>
</nav>

    <!-- Page Header -->
    <div class="max-w-screen-xl mx-auto px-8 pt-12 pb-8">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="font-display text-5xl font-semibold tracking-tighter">Community</h1>
                <p class="text-slate-400 mt-2">Share your builds, moments, and adventures with the community.</p>
            </div>
            
            <!-- Upload Button (only visible when logged in) -->
<!-- Post Button -->
<button id="post-btn"
        class="flex items-center gap-x-2 px-6 py-3 rounded-3xl font-semibold transition-all">
    <span id="post-btn-text">Post</span>
</button>
        </div>
    </div>

    <!-- Image Grid -->
    <div class="max-w-screen-xl mx-auto px-8 pb-20">
        <div id="posts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-slate-500">
                Loading community posts...
            </div>
        </div>
    </div>

    <!-- Login / Register Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-md p-8 relative">
            
            <button onclick="closeAuthModal()" class="absolute top-5 right-5 text-slate-400 hover:text-white">
                <i class="fa-solid fa-times text-xl"></i>
            </button>

            <h2 class="text-2xl font-semibold mb-6" id="modal-title">Login</h2>

            <!-- Login Form -->
            <div id="login-form">
                <div class="space-y-4">
                    <div>
                        <label class="text-sm text-slate-400">Email</label>
                        <input type="email" id="login-email" 
                               class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="text-sm text-slate-400">Password</label>
                        <input type="password" id="login-password" 
                               class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500">
                    </div>
                    <button onclick="loginUser()" 
                            class="w-full py-3 bg-amber-600 hover:bg-amber-500 rounded-3xl font-semibold mt-2">
                        Log In
                    </button>
                </div>
                <p class="text-center text-sm text-slate-400 mt-4">
                    Don't have an account? 
                    <span onclick="switchToRegister()" class="text-amber-400 hover:underline cursor-pointer">Register here</span>
                </p>
            </div>

<!-- Register Form -->
<div id="register-form" class="hidden">
    <div class="space-y-4">
        <!-- Username -->
        <div>
            <label class="text-sm text-slate-400">Username</label>
            <input type="text" id="register-username" 
                   class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500"
                   placeholder="GamerBoi">
        </div>

        <div>
            <label class="text-sm text-slate-400">Email</label>
            <input type="email" id="register-email" 
                   class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500">
        </div>
        <div>
            <label class="text-sm text-slate-400">Password</label>
            <input type="password" id="register-password" 
                   class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500">
        </div>
        <button onclick="registerUser()" 
                class="w-full py-3 bg-amber-600 hover:bg-amber-500 rounded-3xl font-semibold mt-2">
            Create Account
        </button>
    </div>
    <p class="text-center text-sm text-slate-400 mt-4">
        Already have an account? 
        <span onclick="switchToLogin()" class="text-amber-400 hover:underline cursor-pointer">Log in here</span>
    </p>
</div>
        </div>
    </div>

    <script>
        // ==================== SUPABASE SETUP ====================
        const SUPABASE_URL = 'https://syipxmhmpyqbxwjhyjhn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5aXB4bWhtcHlxYnh3amh5amhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTg0OTAsImV4cCI6MjA5ODc3NDQ5MH0.38rPtmkqSSSozJeRqP4eF8MK3vKitzcPULzFyeBlbms'; // ← Replace with your real anon key

        let supabaseClient = null;

        function initSupabase() {
            if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.length < 100) {
                console.error('%c[Supabase] ERROR: Anon key is missing or invalid!', 'color: #ef4444; font-weight: bold');
                return;
            }

            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('%c[Supabase] Client initialized successfully', 'color: #22c55e; font-weight: bold');
            } catch (err) {
                console.error('%c[Supabase] Failed to initialize client:', 'color: #ef4444', err);
            }
        }


        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('account-dropdown');
            const button = event.target.closest('button');
            
            if (!dropdown.contains(event.target) && !button?.textContent.includes('Account')) {
                dropdown.classList.add('hidden');
                document.getElementById('chevron-icon').classList.remove('rotate-180');
            }
        });

        // ==================== COPY SERVER IP ====================
function copyServerIP() {
    navigator.clipboard.writeText('Play.ZendroCraft.Com').then(() => {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-3xl text-sm font-medium shadow-lg z-[200]';
        toast.innerHTML = `<i class="fa-solid fa-check mr-2"></i> <span>IP copied to clipboard!</span>`;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.style.transition = 'all 0.3s ease';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    });
}

        // ==================== MODAL FUNCTIONS ====================
        function showLoginModal() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-modal').classList.add('flex');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('modal-title').textContent = 'Login';
        }

        function showRegisterModal() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-modal').classList.add('flex');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('modal-title').textContent = 'Create Account';
        }

        function closeAuthModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        function switchToRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('modal-title').textContent = 'Create Account';
        }

        function switchToLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('modal-title').textContent = 'Login';
        }

        // ==================== AUTH FUNCTIONS ====================
        async function registerUser() {
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;

            if (!username || !email || !password) {
                alert('Please fill in username, email, and password.');
                return;
            }

            if (username.length < 3) {
                alert('Username must be at least 3 characters long.');
                return;
            }

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: username
                    }
                }
            });

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Account created! You can now log in.');
                closeAuthModal();
            }
        }

        async function loginUser() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                alert('Please enter both email and password.');
                return;
            }

            if (!supabaseClient) {
                alert('Supabase client not initialized. Check your anon key.');
                return;
            }

            console.log('Attempting to login...');

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                console.error('Supabase login error:', error);
                alert('Error: ' + error.message);
            } else {
                console.log('Login success:', data);
                alert('Logged in successfully!');
                closeAuthModal();
            }
        }
        // ==================== DYNAMIC NAVBAR (Show Username when logged in) ====================
        let currentUser = null;

        async function updateNavbar() {
            const navSection = document.getElementById('nav-auth-section');
            if (!navSection) return;

            const { data: { user } } = await supabaseClient.auth.getUser();

            if (user) {
                // === LOGGED IN STATE ===
                currentUser = user;
                let username = user.user_metadata?.username || user.email.split('@')[0];

                navSection.innerHTML = `
                    <div class="relative">
                        <button onclick="toggleUserDropdown(event)"
                                class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-semibold hover:bg-slate-900 transition-colors rounded-3xl border border-slate-700">
                            <span>${username}</span>
                            <i class="fa-solid fa-chevron-down text-xs transition-transform" id="user-chevron"></i>
                        </button>
                        
                        <div id="user-dropdown" 
                             class="hidden absolute right-0 mt-2 w-48 bg-slate-900 border border-slate-700 rounded-2xl shadow-xl py-2 z-50">
                            
                            <a href="account.html" class="block px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3">
                                <i class="fa-solid fa-user-cog w-4"></i>
                                <span>Account Settings</span>
                            </a>
                            
                            <button onclick="logoutUser()" 
                                    class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3 text-red-400">
                                <i class="fa-solid fa-sign-out-alt w-4"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                `;
            } else {
                // === LOGGED OUT STATE (Original Dropdown Style) ===
                navSection.innerHTML = `
                    <div class="relative">
                        <button onclick="toggleLoggedOutDropdown(event)"
                                class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-semibold hover:bg-slate-900 transition-colors rounded-3xl border border-slate-700">
                            <span>Login / Register</span>
                            <i class="fa-solid fa-chevron-down text-xs transition-transform" id="loggedout-chevron"></i>
                        </button>
                        
                        <div id="loggedout-dropdown" 
                             class="hidden absolute right-0 mt-2 w-48 bg-slate-900 border border-slate-700 rounded-2xl shadow-xl py-2 z-50">
                            
                            <button onclick="showLoginModal(); hideLoggedOutDropdown();" 
                                    class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3">
                                <i class="fa-solid fa-sign-in-alt w-4"></i>
                                <span>Log in</span>
                            </button>
                            
                            <button onclick="showRegisterModal(); hideLoggedOutDropdown();" 
                                    class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3">
                                <i class="fa-solid fa-user-plus w-4"></i>
                                <span>Register</span>
                            </button>
                            
                            <div class="border-t border-slate-700 my-1"></div>
                            
                            <a href="#" class="block px-4 py-2.5 text-sm hover:bg-slate-800 text-slate-400">
                                <i class="fa-solid fa-question-circle w-4 mr-3"></i> Forgot Password?
                            </a>
                        </div>
                    </div>
                `;
            }
updatePostButton(user);
        }
        function toggleLoggedOutDropdown(event) {
            event.stopImmediatePropagation();
            const dropdown = document.getElementById('loggedout-dropdown');
            const chevron = document.getElementById('loggedout-chevron');

            if (dropdown.classList.contains('hidden')) {
                dropdown.classList.remove('hidden');
                if (chevron) chevron.classList.add('rotate-180');
            } else {
                dropdown.classList.add('hidden');
                if (chevron) chevron.classList.remove('rotate-180');
            }
        }

        function hideLoggedOutDropdown() {
            const dropdown = document.getElementById('loggedout-dropdown');
            const chevron = document.getElementById('loggedout-chevron');
            if (dropdown) dropdown.classList.add('hidden');
            if (chevron) chevron.classList.remove('rotate-180');
        }

        function toggleUserDropdown(event) {
            event.stopImmediatePropagation();
            const dropdown = document.getElementById('user-dropdown');
            const chevron = document.getElementById('user-chevron');

            if (dropdown.classList.contains('hidden')) {
                dropdown.classList.remove('hidden');
                if (chevron) chevron.classList.add('rotate-180');
            } else {
                dropdown.classList.add('hidden');
                if (chevron) chevron.classList.remove('rotate-180');
            }
        }

        async function logoutUser() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        function setupAuthListener() {
            if (!supabaseClient) return;

            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
                    updateNavbar();
                }
            });
        }

        // ==================== INITIALIZATION ====================
function initializeCommunityPage() {
    initSupabase();

    setTimeout(() => {
        updateNavbar();
        setupAuthListener();

        // Also update the Post button on initial load
        supabaseClient.auth.getUser().then(({ data: { user } }) => {
            updatePostButton(user);
        });
    }, 400);

    console.log('%c[Community] Page initialized.', 'color: #64748b');
}

        window.onload = function() {
            initializeCommunityPage();
        }
// ==================== DYNAMIC POST BUTTON ====================
function updatePostButton(user) {
    const postBtn = document.getElementById('post-btn');
    const postBtnText = document.getElementById('post-btn-text');

    if (!postBtn || !postBtnText) return;

    if (user) {
        // === LOGGED IN USER ===
        postBtn.className = `flex items-center gap-x-2 px-6 py-3 bg-slate-900 border border-slate-800 hover:border-amber-500/50 rounded-3xl font-semibold transition-all`;

        postBtnText.innerHTML = `
            <i class="fa-solid fa-plus text-amber-400"></i>
            <span class="text-white">Post</span>
        `;

        postBtn.onclick = () => showUploadModal();

        // Clear hover events from logged out state
        postBtn.onmouseenter = null;
        postBtn.onmouseleave = null;

    } else {
        // === LOGGED OUT USER ===
        postBtn.className = `flex items-center gap-x-2 px-6 py-3 bg-slate-900 border border-slate-700 hover:border-red-500 rounded-3xl font-semibold transition-all`;

        postBtnText.innerHTML = `
            <i class="fa-solid fa-plus"></i>
            <span>Post</span>
        `;

        postBtn.onclick = () => showLoginModal();

        // Hover effect
        postBtn.onmouseenter = () => {
            postBtnText.innerHTML = `
                <i class="fa-solid fa-lock text-red-400"></i>
                <span class="text-red-400">Must Login to Post</span>
            `;
            postBtn.style.borderColor = '#ef4444';
        };

        postBtn.onmouseleave = () => {
            postBtnText.innerHTML = `
                <i class="fa-solid fa-plus"></i>
                <span>Post</span>
            `;
            postBtn.style.borderColor = '';
        };
    }
}
    </script>

</body>
</html>
