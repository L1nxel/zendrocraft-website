<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets & Support • ZendroCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        #my-tickets-list::-webkit-scrollbar { width: 6px; }
        #my-tickets-list::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 20px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-200">

<!-- Navbar -->
<nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-lg sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto">
        <div class="px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3 cursor-pointer" onclick="window.location.href='index.html'">
                <img src="logo.png" alt="ZendroCraft" class="w-11 h-11 rounded-2xl">
                <span class="font-display text-3xl font-semibold tracking-tighter">ZendroCraft</span>
            </div>
            <div class="flex items-center gap-x-4">
                <div onclick="copyServerIP()" class="hidden md:flex items-center gap-x-2 px-4 py-2 bg-slate-900 border border-slate-700 hover:border-emerald-500/50 transition-colors rounded-3xl cursor-pointer group">
                    <div class="flex items-center gap-x-2">
                        <i class="fa-solid fa-globe text-emerald-400"></i>
                        <div><span class="text-sm text-slate-400">Server IP</span> <span class="font-mono font-semibold ml-1.5 group-hover:text-emerald-400">Play.ZendroCraft.Com</span></div>
                    </div>
                    <i class="fa-solid fa-copy text-emerald-400 opacity-60 group-hover:opacity-100 transition-all ml-1"></i>
                </div>
                <div class="relative" id="nav-auth-section"></div>
            </div>
        </div>
    </div>
</nav>

<!-- Header -->
<div class="max-w-screen-xl mx-auto px-8 pt-12 pb-8">
    <div class="max-w-3xl">
        <div class="flex items-center gap-x-4 mb-4">
            <i class="fa-solid fa-ticket-alt text-amber-400 text-4xl"></i>
            <h1 class="text-5xl font-display font-semibold tracking-tighter text-amber-400">Tickets & Support</h1>
        </div>
        <p class="text-xl text-slate-300">Need help? Submit a ticket and our team will review it.</p>
    </div>
</div>

<!-- Main Content -->
<div class="max-w-screen-xl mx-auto px-8 pb-16">
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">

        <!-- Submit Ticket -->
        <div class="lg:col-span-3">
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-6">Submit a New Ticket</h2>
                <form id="ticket-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Category</label>
                        <select id="ticket-category" required class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white focus:outline-none focus:border-amber-500">
                            <option value="">Select a category...</option>
                            <option value="Bug Report">Bug Report</option>
                            <option value="Player Report">Player Report</option>
                            <option value="Suggestion">Suggestion / Feature Request</option>
                            <option value="Appeal">Ban / Punishment Appeal</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Title</label>
                        <input type="text" id="ticket-title" required maxlength="100" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white focus:outline-none focus:border-amber-500" placeholder="Brief summary of the issue">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Description</label>
                        <textarea id="ticket-description" rows="6" required class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 text-white focus:outline-none focus:border-amber-500 resize-y" placeholder="Please describe your issue in detail..."></textarea>
                    </div>
                    <button type="submit" class="w-full py-3.5 bg-amber-600 hover:bg-amber-500 rounded-3xl font-semibold transition-colors">Submit Ticket</button>
                </form>
            </div>
        </div>

        <!-- My Tickets -->
        <div class="lg:col-span-2">
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-semibold">My Tickets</h2>
                    <span id="open-ticket-count" class="text-sm px-3 py-1 bg-slate-800 rounded-full"></span>
                </div>
                <div class="max-h-[380px] overflow-y-auto pr-2 -mr-2">
                    <div id="my-tickets-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Ticket Modal -->
<div id="ticket-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-2xl max-h-[90vh] flex flex-col">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-700">
            <div>
                <h3 id="modal-ticket-title" class="text-xl font-semibold"></h3>
                <div class="flex items-center gap-x-2 mt-1">
                    <span id="modal-ticket-category" class="text-sm text-slate-400"></span>
                    <span id="modal-ticket-status" class="px-3 py-0.5 text-xs rounded-full"></span>
                </div>
            </div>
            <button onclick="closeTicketModal()" class="text-2xl text-slate-400 hover:text-white">&times;</button>
        </div>

        <!-- Messages -->
        <div id="modal-messages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-950"></div>

        <!-- Reply Area -->
        <div class="p-4 border-t border-slate-700">
            <div class="flex gap-x-3">
                <textarea id="reply-message" rows="2" placeholder="Type your reply..." class="flex-1 bg-slate-900 border border-slate-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500 resize-none"></textarea>
                <button onclick="sendReply()" class="px-6 py-3 bg-amber-600 hover:bg-amber-500 rounded-3xl font-semibold flex items-center justify-center">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <div class="flex justify-between mt-3">
                <button id="modal-close-btn" onclick="closeCurrentTicket()" class="text-sm px-4 py-2 bg-red-600/10 hover:bg-red-600/20 text-red-400 rounded-2xl transition-colors">Close Ticket</button>
                <button id="modal-reopen-btn" onclick="reopenCurrentTicket()" class="hidden text-sm px-4 py-2 bg-emerald-600/10 hover:bg-emerald-600/20 text-emerald-400 rounded-2xl transition-colors">Reopen Ticket</button>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="border-t border-slate-800 bg-slate-950">
    <div class="max-w-screen-xl mx-auto px-8 py-12">
        <div class="flex flex-col md:flex-row justify-between items-center gap-y-4">
            <div class="flex items-center gap-x-3">
                <img src="logo.png" alt="ZendroCraft" class="w-9 h-9 rounded-xl">
                <span class="font-semibold">ZendroCraft</span>
                <span class="text-slate-500 text-sm">• Minnesota, USA</span>
            </div>
            <div class="flex items-center gap-x-2 text-sm text-slate-500">
                <i class="fa-solid fa-shield-halved text-amber-400"></i>
                <span>Protected by Cloudflare • DDoS Protected</span>
            </div>
            <div class="text-sm text-slate-500">© 2026 ZendroCraft. All rights reserved.</div>
        </div>
    </div>
</footer>

<script>
    const SUPABASE_URL = 'https://syipxmhmpyqbxwjhyjhn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5aXB4bWhtcHlxYnh3amh5amhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTg0OTAsImV4cCI6MjA5ODc3NDQ5MH0.38rPtmkqSSSozJeRqP4eF8MK3vKitzcPULzFyeBlbms';

    let supabaseClient = null;
    let currentTickets = [];
    let currentTicketId = null;
    const MAX_OPEN_TICKETS = 3;

    function initSupabase() {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    async function updateNavbar() { /* navbar code same as before */ }
    function toggleUserDropdown(e) { /* ... */ }
    async function logoutUser() { /* ... */ }
    function copyServerIP() { /* ... */ }

    function formatDateTime(dateString) {
        return new Date(dateString).toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    async function getOpenTicketCount(userId) {
        const { count } = await supabaseClient.from('tickets').select('*', { count: 'exact', head: true })
            .eq('user_id', userId).neq('status', 'Closed');
        return count || 0;
    }

    // Load tickets
    async function loadMyTickets() {
        const container = document.getElementById('my-tickets-list');
        const countEl = document.getElementById('open-ticket-count');
        container.innerHTML = `<div class="text-center py-6 text-slate-500">Loading...</div>`;

        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;

        const { data: tickets } = await supabaseClient.from('tickets').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
        currentTickets = tickets || [];

        const openCount = currentTickets.filter(t => t.status !== 'Closed').length;
        countEl.innerHTML = `${openCount} / ${MAX_OPEN_TICKETS} open`;

        if (currentTickets.length === 0) {
            container.innerHTML = `<div class="text-center py-8 text-slate-500"><i class="fa-solid fa-inbox text-3xl mb-3"></i><p>No tickets yet.</p></div>`;
            return;
        }

        container.innerHTML = '';
        currentTickets.forEach((ticket, index) => {
            const date = formatDateTime(ticket.created_at);
            let statusColor = ticket.status === 'Closed' ? 'bg-slate-700 text-slate-400' : 
                             ticket.status === 'Waiting for Response' ? 'bg-amber-500/10 text-amber-400' : 'bg-emerald-500/10 text-emerald-400';

            const card = document.createElement('div');
            card.className = `bg-slate-950 border border-slate-700 rounded-2xl p-5 cursor-pointer hover:border-amber-500/50 transition-colors`;
            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <div><span class="text-sm text-slate-400">${date}</span><h4 class="font-semibold mt-1">${ticket.title}</h4></div>
                    <span class="px-3 py-1 text-xs rounded-full ${statusColor}">${ticket.status}</span>
                </div>
                <p class="text-sm text-slate-300 line-clamp-2">${ticket.description}</p>
            `;
            card.onclick = () => openTicketModal(index);
            container.appendChild(card);
        });
    }

    // Open modal
    async function openTicketModal(ticketIndex) {
        const ticket = currentTickets[ticketIndex];
        currentTicketId = ticket.id;

        document.getElementById('modal-ticket-title').textContent = ticket.title;
        document.getElementById('modal-ticket-category').textContent = ticket.category;

        const statusEl = document.getElementById('modal-ticket-status');
        let statusColor = ticket.status === 'Closed' ? 'bg-slate-700 text-slate-400' : 
                         ticket.status === 'Waiting for Response' ? 'bg-amber-500/10 text-amber-400' : 'bg-emerald-500/10 text-emerald-400';
        statusEl.className = `px-3 py-0.5 text-xs rounded-full ${statusColor}`;
        statusEl.textContent = ticket.status;

        // Show/hide close/reopen buttons
        document.getElementById('modal-close-btn').classList.toggle('hidden', ticket.status === 'Closed');
        document.getElementById('modal-reopen-btn').classList.toggle('hidden', ticket.status !== 'Closed');

        document.getElementById('ticket-modal').classList.remove('hidden');
        document.getElementById('ticket-modal').classList.add('flex');

        await loadTicketMessages(ticket.id);
    }

    function closeTicketModal() {
        document.getElementById('ticket-modal').classList.remove('flex');
        document.getElementById('ticket-modal').classList.add('hidden');
        currentTicketId = null;
    }

    async function loadTicketMessages(ticketId) {
        const container = document.getElementById('modal-messages');
        container.innerHTML = `<div class="text-center py-8 text-slate-500">Loading conversation...</div>`;

        const { data: messages } = await supabaseClient.from('ticket_messages').select('*').eq('ticket_id', ticketId).order('created_at', { ascending: true });

        if (!messages || messages.length === 0) {
            container.innerHTML = `<div class="text-center py-8 text-slate-500">No messages yet.</div>`;
            return;
        }

        container.innerHTML = '';
        messages.forEach(msg => {
            const isUser = !msg.is_admin;
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="message-bubble px-4 py-3 rounded-3xl max-w-[80%] ${isUser ? 'bg-amber-600 text-white' : 'bg-slate-800 text-slate-200'}">
                    <p class="text-sm">${msg.message}</p>
                    <p class="text-[10px] mt-1 opacity-70 text-right">${formatDateTime(msg.created_at)}</p>
                </div>
            `;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    // Send reply (with limit check if reopening via reply)
    async function sendReply() {
        const textarea = document.getElementById('reply-message');
        const message = textarea.value.trim();
        if (!message || !currentTicketId) return;

        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;

        // Get current ticket status
        const { data: ticketData } = await supabaseClient.from('tickets').select('status').eq('id', currentTicketId).single();

        if (ticketData.status === 'Closed') {
            const openCount = await getOpenTicketCount(user.id);
            if (openCount >= MAX_OPEN_TICKETS) {
                alert(`You already have ${MAX_OPEN_TICKETS} open tickets. Close one before reopening.`);
                return;
            }
        }

        // Insert message
        await supabaseClient.from('ticket_messages').insert({
            ticket_id: currentTicketId,
            user_id: user.id,
            message: message,
            is_admin: false
        });

        // Update status
        await supabaseClient.from('tickets').update({ 
            status: 'Waiting for Response',
            updated_at: new Date().toISOString()
        }).eq('id', currentTicketId);

        // Notify admin
        try {
            await supabaseClient.functions.invoke('clever-endpoint', {
                body: { 
                    type: 'user_reply', 
                    ticket_id: currentTicketId, 
                    message,
                    username: user.user_metadata?.username || user.email.split('@')[0]
                }
            });
        } catch (e) { console.error(e); }

        textarea.value = '';
        await loadTicketMessages(currentTicketId);
        loadMyTickets();
    }

    // Close ticket from modal
    async function closeCurrentTicket() {
        if (!currentTicketId || !confirm("Close this ticket?")) return;

        await supabaseClient.from('tickets').update({ 
            status: 'Closed', 
            closed_at: new Date().toISOString() 
        }).eq('id', currentTicketId);

        try {
            await supabaseClient.functions.invoke('clever-endpoint', {
                body: { type: 'ticket_closed', ticket_id: currentTicketId }
            });
        } catch (e) {}

        closeTicketModal();
        loadMyTickets();
    }

    // Reopen from modal
    async function reopenCurrentTicket() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;

        const openCount = await getOpenTicketCount(user.id);
        if (openCount >= MAX_OPEN_TICKETS) {
            alert(`You already have ${MAX_OPEN_TICKETS} open tickets.`);
            return;
        }

        if (!confirm("Reopen this ticket?")) return;

        await supabaseClient.from('tickets').update({ 
            status: 'Open', 
            closed_at: null 
        }).eq('id', currentTicketId);

        try {
            await supabaseClient.functions.invoke('clever-endpoint', {
                body: { type: 'ticket_reopened', ticket_id: currentTicketId }
            });
        } catch (e) {}

        closeTicketModal();
        loadMyTickets();
    }

    // Submit new ticket (with email)
    async function handleTicketSubmit(e) {
        e.preventDefault();
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;

        const openCount = await getOpenTicketCount(user.id);
        if (openCount >= MAX_OPEN_TICKETS) {
            alert(`You can only have ${MAX_OPEN_TICKETS} open tickets.`);
            return;
        }

        const category = document.getElementById('ticket-category').value;
        const title = document.getElementById('ticket-title').value.trim();
        const description = document.getElementById('ticket-description').value.trim();
        const username = user.user_metadata?.username || user.email.split('@')[0];

        const { data: inserted } = await supabaseClient.from('tickets').insert({
            user_id: user.id, category, title, description, status: 'Open'
        }).select().single();

        try {
            await supabaseClient.functions.invoke('clever-endpoint', {
                body: { type: 'new_ticket', ticket: { ...inserted, username } }
            });
        } catch (e) {}

        alert("Ticket created!");
        document.getElementById('ticket-form').reset();
        loadMyTickets();
    }

    function initializePage() {
        initSupabase();
        setTimeout(async () => {
            await updateNavbar();
            await loadMyTickets();
        }, 400);

        document.getElementById('ticket-form').addEventListener('submit', handleTicketSubmit);

        // Close modal on outside click
        document.getElementById('ticket-modal').addEventListener('click', (e) => {
            if (e.target.id === 'ticket-modal') closeTicketModal();
        });
    }

    window.onload = initializePage;
</script>
</body>
</html>
