<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings • ZendroCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

<!-- Navbar -->
<nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-lg sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto">
        <div class="px-8 py-5 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-x-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-cube text-white text-3xl"></i>
                </div>
                <span class="font-display text-3xl font-semibold tracking-tighter">ZendroCraft</span>
            </div>

            <!-- Right Side -->
            <div class="flex items-center gap-x-4">

                <!-- Server IP (Copy Play.ZendroCraft.Com) -->
                <div onclick="copyServerIP()" 
                     class="hidden md:flex items-center gap-x-2 px-4 py-2 bg-slate-900 border border-slate-700 hover:border-emerald-500/50 transition-colors rounded-3xl cursor-pointer group">
                    <div class="flex items-center gap-x-2">
                        <i class="fa-solid fa-globe text-emerald-400"></i>
                        <div>
                            <span class="text-sm text-slate-400">Server IP</span>
                            <span class="font-mono font-semibold ml-1.5 group-hover:text-emerald-400 transition-colors">Play.ZendroCraft.Com</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-copy text-emerald-400 opacity-60 group-hover:opacity-100 transition-all ml-1"></i>
                </div>

                <!-- Dynamic Auth Section -->
                <div class="relative" id="nav-auth-section">
                    <!-- Content controlled by JavaScript -->
                </div>

            </div>
        </div>
    </div>
</nav>

    <!-- Page Content -->
    <div class="max-w-screen-md mx-auto px-8 pt-12 pb-20">
        <div class="mb-10">
            <h1 class="font-display text-5xl font-semibold tracking-tighter">Account Settings</h1>
            <p class="text-slate-400 mt-2">Manage your profile and security settings.</p>
        </div>

        <!-- Username Section -->
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="text-xl font-semibold">Username</h3>
                    <p id="current-username" class="text-2xl font-semibold text-emerald-400 mt-1">Loading...</p>
                </div>
                <button onclick="editUsername()" 
                        class="px-5 py-2.5 text-sm font-semibold bg-slate-800 hover:bg-slate-700 rounded-3xl transition-colors">
                    <i class="fa-solid fa-edit mr-2"></i> Edit
                </button>
            </div>
        </div>

        <!-- Email Section -->
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h3 class="text-xl font-semibold">Email Address</h3>
                    <p id="current-email" class="text-lg text-slate-300 mt-1">Loading...</p>
                </div>
                <button onclick="editEmail()" 
                        class="px-5 py-2.5 text-sm font-semibold bg-slate-800 hover:bg-slate-700 rounded-3xl transition-colors">
                    <i class="fa-solid fa-edit mr-2"></i> Edit
                </button>
            </div>
        </div>

        <!-- Password Section -->
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-xl font-semibold">Password</h3>
                    <p class="text-slate-400 mt-1">Change your account password</p>
                </div>
                <button onclick="editPassword()" 
                        class="px-5 py-2.5 text-sm font-semibold bg-slate-800 hover:bg-slate-700 rounded-3xl transition-colors">
                    <i class="fa-solid fa-key mr-2"></i> Change Password
                </button>
            </div>
        </div>

        <!-- Logout Button -->
        <div class="text-center">
            <button onclick="logoutUser()" 
                    class="px-8 py-3 text-red-400 hover:text-red-300 font-semibold flex items-center gap-x-2 mx-auto">
                <i class="fa-solid fa-sign-out-alt"></i>
                <span>Log Out</span>
            </button>
        </div>
    </div>

    <script>
        // ==================== SUPABASE SETUP ====================
        const SUPABASE_URL = 'https://syipxmhmpyqbxwjhyjhn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5aXB4bWhtcHlxYnh3amh5amhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTg0OTAsImV4cCI6MjA5ODc3NDQ5MH0.38rPtmkqSSSozJeRqP4eF8MK3vKitzcPULzFyeBlbms'; // ← Replace with your real key

        let supabaseClient = null;
        let currentUser = null;

        function initSupabase() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        async function checkAuthAndLoadData() {
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!user) {
                // Not logged in → redirect to homepage
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;

            // Show username in navbar
            updateNavbar(user);

            // Load user data into the page
            const username = user.user_metadata?.username || user.email.split('@')[0];
            document.getElementById('current-username').textContent = username;
            document.getElementById('current-email').textContent = user.email;
        }

        function updateNavbar(user) {
            const navSection = document.getElementById('nav-auth-section');
            if (!navSection || !user) return;

            const username = user.user_metadata?.username || user.email.split('@')[0];

            navSection.innerHTML = `
                <div class="relative">
                    <button onclick="toggleUserDropdown(event)"
                            class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-semibold hover:bg-slate-900 transition-colors rounded-3xl border border-slate-700">
                        <span>${username}</span>
                        <i class="fa-solid fa-chevron-down text-xs transition-transform" id="user-chevron"></i>
                    </button>
                    
                    <div id="user-dropdown" 
                         class="hidden absolute right-0 mt-2 w-48 bg-slate-900 border border-slate-700 rounded-2xl shadow-xl py-2 z-50">
                        
                        <a href="account.html" class="block px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3">
                            <i class="fa-solid fa-user-cog w-4"></i>
                            <span>Account Settings</span>
                        </a>
                        
                        <button onclick="logoutUser()" 
                                class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3 text-red-400">
                            <i class="fa-solid fa-sign-out-alt w-4"></i>
                            <span>Logout</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function toggleUserDropdown(event) {
            event.stopImmediatePropagation();
            const dropdown = document.getElementById('user-dropdown');
            const chevron = document.getElementById('user-chevron');

            if (dropdown.classList.contains('hidden')) {
                dropdown.classList.remove('hidden');
                if (chevron) chevron.classList.add('rotate-180');
            } else {
                dropdown.classList.add('hidden');
                if (chevron) chevron.classList.remove('rotate-180');
            }
        }

        async function editUsername() {
            const newUsername = prompt("Enter your new username:");
            if (!newUsername || newUsername.length < 3) return;

            const { error } = await supabaseClient.auth.updateUser({
                data: { username: newUsername }
            });

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Username updated successfully!');
                document.getElementById('current-username').textContent = newUsername;
            }
        }

        async function editEmail() {
            const newEmail = prompt("Enter your new email address:");
            if (!newEmail) return;

            const { error } = await supabaseClient.auth.updateUser({ email: newEmail });

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('A confirmation email has been sent to your new address.');
            }
        }

        async function editPassword() {
            const newPassword = prompt("Enter your new password (min 6 characters):");
            if (!newPassword || newPassword.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Password updated successfully!');
            }
        }

        async function logoutUser() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

        // Initialize everything
        window.onload = function() {
            initSupabase();
            checkAuthAndLoadData();
        }
function copyServerIP() {
    navigator.clipboard.writeText('Play.ZendroCraft.Com').then(() => {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-3xl text-sm font-medium shadow-lg z-[200]';
        toast.innerHTML = `<i class="fa-solid fa-check mr-2"></i> <span>IP copied to clipboard!</span>`;
        document.body.appendChild(toast);

        setTimeout(() => {
            toast.style.transition = 'all 0.3s ease';
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    });
}
    </script>

</body>
</html>
