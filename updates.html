<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Updates • ZendroCraft</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        
        .vote-btn {
            transition: all 0.2s ease;
            background-color: #1e2937;
            border: 1px solid #475569;
        }
        .vote-btn:hover {
            background-color: #f59e0b;
            color: white;
            border-color: #f59e0b;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

<!-- Navbar -->
<nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-lg sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto">
        <div class="px-8 py-5 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-x-3 cursor-pointer" onclick="window.location.href='index.html'">
                <img src="logo.png" alt="ZendroCraft" class="w-11 h-11 rounded-2xl">
                <span class="font-display text-3xl font-semibold tracking-tighter">ZendroCraft</span>
            </div>

            <!-- Right Side -->
            <div class="flex items-center gap-x-4">
                <!-- Server IP -->
                <div onclick="copyServerIP()" 
                     class="hidden md:flex items-center gap-x-2 px-4 py-2 bg-slate-900 border border-slate-700 hover:border-emerald-500/50 transition-colors rounded-3xl cursor-pointer group">
                    <div class="flex items-center gap-x-2">
                        <i class="fa-solid fa-globe text-emerald-400"></i>
                        <div>
                            <span class="text-sm text-slate-400">Server IP</span>
                            <span class="font-mono font-semibold ml-1.5 group-hover:text-emerald-400 transition-colors">Play.ZendroCraft.Com</span>
                        </div>
                    </div>
                    <i class="fa-solid fa-copy text-emerald-400 opacity-60 group-hover:opacity-100 transition-all ml-1"></i>
                </div>

                <!-- Dynamic Auth Section -->
                <div class="relative" id="nav-auth-section"></div>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-screen-xl mx-auto px-8 pt-12 pb-20">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="font-display text-5xl font-semibold tracking-tighter">Updates</h1>
            <p class="text-slate-400 mt-2">Latest changes and news from ZendroCraft</p>
        </div>
        
        <!-- Admin Post Button -->
        <button id="admin-post-btn"
                onclick="showUpdateModal()"
                class="hidden items-center gap-x-2 px-6 py-3 bg-amber-600 hover:bg-amber-500 rounded-3xl font-semibold transition-all">
            <i class="fa-solid fa-plus"></i>
            <span>Post Update</span>
        </button>
    </div>

    <!-- Updates List -->
    <div id="updates-list" class="space-y-6">
        <div class="text-center py-12 text-slate-500">Loading updates...</div>
    </div>
</div>

<!-- Admin Update Modal -->
<div id="update-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-2xl p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-semibold">Post New Update</h2>
            <button onclick="closeUpdateModal()" class="text-slate-400 hover:text-white text-2xl">&times;</button>
        </div>

        <div class="space-y-5">
            <!-- Title + Version -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-sm text-slate-400">Update Name</label>
                    <input type="text" id="update-title" class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500" placeholder="World Border Expansion">
                </div>
                <div>
                    <label class="text-sm text-slate-400">Version</label>
                    <input type="text" id="update-version" class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500" placeholder="v1.5.0">
                </div>
            </div>

            <!-- Content / Bullet Points -->
            <div>
                <label class="text-sm text-slate-400">What's New (Bullet Points)</label>
                <textarea id="update-content" rows="5" class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500 resize-y" placeholder="- Added new quests&#10;- Expanded world border"></textarea>
            </div>

            <!-- Media Upload -->
            <div>
                <label class="text-sm text-slate-400">Images / Videos (Multiple)</label>
                <input type="file" id="update-media" multiple accept="image/*,video/*" class="mt-1 block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-2xl file:border-0 file:bg-slate-800 file:text-white hover:file:bg-slate-700">
            </div>

            <!-- Vote Options -->
            <div>
                <label class="text-sm text-slate-400">Vote Options (one per line)</label>
                <textarea id="vote-options" rows="3" class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500" placeholder="Love it&#10;It's okay&#10;Needs work"></textarea>
            </div>

            <!-- Posted By -->
            <div>
                <label class="text-sm text-slate-400">Posted By</label>
                <input type="text" id="posted-by" class="w-full mt-1 px-4 py-3 bg-slate-950 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500" placeholder="L1nxel">
            </div>
        </div>

        <div class="flex gap-x-3 mt-8">
            <button onclick="closeUpdateModal()" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-3xl font-semibold">Cancel</button>
            <button onclick="submitUpdate()" class="flex-1 py-3 bg-amber-600 hover:bg-amber-500 rounded-3xl font-semibold">Post Update</button>
        </div>
    </div>
</div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://syipxmhmpyqbxwjhyjhn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN5aXB4bWhtcHlxYnh3amh5amhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTg0OTAsImV4cCI6MjA5ODc3NDQ5MH0.38rPtmkqSSSozJeRqP4eF8MK3vKitzcPULzFyeBlbms';

let supabaseClient = null;
let currentUser = null;

function initSupabase() {
    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

// ==================== DYNAMIC NAVBAR ====================
async function updateNavbar() {
    const navSection = document.getElementById('nav-auth-section');
    if (!navSection) return;

    const { data: { user } } = await supabaseClient.auth.getUser();

    if (user) {
        currentUser = user;
        const username = user.user_metadata?.username || user.email.split('@')[0];

        navSection.innerHTML = `
            <div class="relative">
                <button onclick="toggleUserDropdown(event)"
                        class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-semibold hover:bg-slate-900 transition-colors rounded-3xl border border-slate-700">
                    <span>${username}</span>
                    <i class="fa-solid fa-chevron-down text-xs transition-transform" id="user-chevron"></i>
                </button>
                
                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-slate-900 border border-slate-700 rounded-2xl shadow-xl py-2 z-50">
                    <a href="account.html" class="block px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3">
                        <i class="fa-solid fa-user-cog w-4"></i>
                        <span>Account Settings</span>
                    </a>
                    <button onclick="logoutUser()" class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3 text-red-400">
                        <i class="fa-solid fa-sign-out-alt w-4"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        `;
    } else {
        navSection.innerHTML = `
            <div class="relative">
                <button onclick="toggleLoggedOutDropdown(event)"
                        class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-semibold hover:bg-slate-900 transition-colors rounded-3xl border border-slate-700">
                    <span>Login / Register</span>
                    <i class="fa-solid fa-chevron-down text-xs transition-transform" id="loggedout-chevron"></i>
                </button>
                
                <div id="loggedout-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-slate-900 border border-slate-700 rounded-2xl shadow-xl py-2 z-50">
                    <button onclick="showLoginModal(); hideLoggedOutDropdown();" class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3">
                        <i class="fa-solid fa-sign-in-alt w-4"></i>
                        <span>Log in</span>
                    </button>
                    <button onclick="showRegisterModal(); hideLoggedOutDropdown();" class="w-full text-left px-4 py-2.5 text-sm hover:bg-slate-800 flex items-center gap-x-3">
                        <i class="fa-solid fa-user-plus w-4"></i>
                        <span>Register</span>
                    </button>
                    <div class="border-t border-slate-700 my-1"></div>
                    <a href="#" class="block px-4 py-2.5 text-sm hover:bg-slate-800 text-slate-400">
                        <i class="fa-solid fa-question-circle w-4 mr-3"></i> Forgot Password?
                    </a>
                </div>
            </div>
        `;
    }
}

function toggleLoggedOutDropdown(event) {
    event.stopImmediatePropagation();
    const dropdown = document.getElementById('loggedout-dropdown');
    const chevron = document.getElementById('loggedout-chevron');
    dropdown.classList.toggle('hidden');
    if (chevron) chevron.classList.toggle('rotate-180');
}

function hideLoggedOutDropdown() {
    const dropdown = document.getElementById('loggedout-dropdown');
    const chevron = document.getElementById('loggedout-chevron');
    if (dropdown) dropdown.classList.add('hidden');
    if (chevron) chevron.classList.remove('rotate-180');
}

function toggleUserDropdown(event) {
    event.stopImmediatePropagation();
    const dropdown = document.getElementById('user-dropdown');
    const chevron = document.getElementById('user-chevron');
    dropdown.classList.toggle('hidden');
    if (chevron) chevron.classList.toggle('rotate-180');
}

async function logoutUser() {
    await supabaseClient.auth.signOut();
    window.location.reload();
}

// ==================== LOAD UPDATES ====================
async function loadUpdates() {
    const container = document.getElementById('updates-list');
    container.innerHTML = `<div class="text-center py-12 text-slate-500">Loading updates...</div>`;

    const { data: updates, error } = await supabaseClient
        .from('updates')
        .select('*')
        .order('created_at', { ascending: false });

    if (error || !updates || updates.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-slate-500">No updates yet.</div>`;
        return;
    }

    container.innerHTML = '';

    updates.forEach(update => {
        const date = new Date(update.created_at).toLocaleDateString('en-US', {
            month: 'short', day: 'numeric', year: 'numeric'
        });

        let mediaHTML = '';
        if (update.media_urls && update.media_urls.length > 0) {
            const first = update.media_urls[0];
            if (first.endsWith('.mp4') || first.endsWith('.webm')) {
                mediaHTML = `<video src="${first}" class="w-full rounded-2xl" controls></video>`;
            } else {
                mediaHTML = `<img src="${first}" class="w-full rounded-2xl object-cover">`;
            }
        }

        let votesHTML = '';
        if (update.vote_options && update.vote_options.length > 0) {
            votesHTML = update.vote_options.map(opt => `
                <button onclick="voteOnUpdate('${update.id}', '${opt}')"
                        class="vote-btn px-4 py-1.5 text-sm rounded-2xl flex items-center gap-x-2">
                    ${opt} <span class="font-mono text-xs">(0)</span>
                </button>
            `).join('');
        }

        const html = `
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <div class="flex items-center gap-x-3">
                            <span class="font-semibold text-xl">${update.title}</span>
                            ${update.version ? `<span class="px-3 py-1 text-xs bg-slate-800 text-amber-400 rounded-2xl">${update.version}</span>` : ''}
                        </div>
                        <div class="text-xs text-slate-500 mt-1">${date}</div>
                    </div>
                    ${update.posted_by ? `<div class="text-sm text-slate-400">Posted by <span class="text-amber-400">${update.posted_by}</span></div>` : ''}
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2">
                        <div class="text-slate-300 whitespace-pre-line">${update.content || ''}</div>
                        
                        ${votesHTML ? `
                            <div class="mt-6">
                                <div class="text-sm text-slate-400 mb-2">Was this update good?</div>
                                <div class="flex flex-wrap gap-2">
                                    ${votesHTML}
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    ${mediaHTML ? `
                        <div class="lg:col-span-1">
                            ${mediaHTML}
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
        container.innerHTML += html;
    });
}

// ==================== ADMIN CHECK ====================
async function checkIfAdmin() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    const adminBtn = document.getElementById('admin-post-btn');
    
    if (user && user.email === 'ZendroCraftAdmin@gmail.com') {
        adminBtn.classList.remove('hidden');
        adminBtn.classList.add('flex');
    } else {
        adminBtn.classList.add('hidden');
        adminBtn.classList.remove('flex');
    }
}

// ==================== MODAL ====================
function showUpdateModal() {
    document.getElementById('update-modal').classList.remove('hidden');
    document.getElementById('update-modal').classList.add('flex');
}

function closeUpdateModal() {
    document.getElementById('update-modal').classList.remove('flex');
    document.getElementById('update-modal').classList.add('hidden');
}

// ==================== SUBMIT UPDATE ====================
async function submitUpdate() {
    const title = document.getElementById('update-title').value.trim();
    const version = document.getElementById('update-version').value.trim();
    const content = document.getElementById('update-content').value.trim();
    const postedBy = document.getElementById('posted-by').value.trim();
    const voteOptionsRaw = document.getElementById('vote-options').value.trim();
    const voteOptions = voteOptionsRaw ? voteOptionsRaw.split('\n').filter(Boolean) : [];

    if (!title) {
        alert("Title is required");
        return;
    }

    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user || user.email !== 'ZendroCraftAdmin@gmail.com') {
        alert("Only the admin can post updates.");
        return;
    }

    // TODO: Add media upload logic here later

    const { error } = await supabaseClient.from('updates').insert({
        user_id: user.id,
        title,
        version,
        content,
        posted_by: postedBy,
        vote_options: voteOptions,
        media_urls: []
    });

    if (error) {
        alert("Failed to post update: " + error.message);
    } else {
        alert("Update posted successfully!");
        closeUpdateModal();
        loadUpdates();
    }
}

// ==================== VOTING (Placeholder for now) ====================
async function voteOnUpdate(updateId, option) {
    alert(`You voted for: ${option}\n(Full voting system coming next)`);
}

// ==================== INIT ====================
async function initUpdatesPage() {
    initSupabase();
    await loadUpdates();
    await checkIfAdmin();
    setTimeout(() => {
        updateNavbar();
    }, 400);
}

window.onload = initUpdatesPage;

function copyServerIP() {
    navigator.clipboard.writeText('Play.ZendroCraft.Com').then(() => {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-3xl text-sm font-medium shadow-lg z-[200]';
        toast.innerHTML = `<i class="fa-solid fa-check mr-2"></i> <span>IP copied to clipboard!</span>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    });
}
</script>
